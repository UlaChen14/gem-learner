<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>💎 Gemstone Learner</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0D0D12;--bg2:#16161F;--bg3:#20202C;--text:#F0EDE6;--text2:#9896A0;--text3:#56546A;--gold:#C8A96E;--ok:#4CAF7A;--err:#E05252;--b1:rgba(255,255,255,0.07);--b2:rgba(255,255,255,0.14);--r:12px}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
button{font-family:'DM Sans',sans-serif;cursor:pointer}
nav{display:flex;align-items:center;gap:6px;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--b1);flex-wrap:wrap;position:sticky;top:0;z-index:50}
.logo{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold);margin-right:8px;flex-shrink:0}
.nb{padding:7px 14px;border:1px solid var(--b2);border-radius:20px;background:transparent;color:var(--text2);font-size:13px;transition:all .15s}
.nb:hover{background:var(--bg3);color:var(--text)}.nb.act{background:var(--gold);color:#000;border-color:var(--gold);font-weight:500}
.pw{height:3px;background:var(--bg3)}.prog{height:100%;background:var(--gold);transition:width .4s;width:0%}
main{flex:1;padding:20px;max-width:1000px;margin:0 auto;width:100%}
.status-bar{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3);margin-bottom:14px;padding:6px 12px;background:var(--bg2);border-radius:8px;border:1px solid var(--b1)}
.spin{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--gold);border-top-color:transparent;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── pic slot ── */
/* .ps is the image container; always a grid when showing products */
.ps{background:var(--bg3);overflow:hidden;width:100%;height:100%}

/* ── browse ── */
.crow{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.srch{flex:1;min-width:160px;padding:8px 14px;background:var(--bg2);border:1px solid var(--b2);border-radius:8px;color:var(--text);font-size:14px;outline:none;font-family:'DM Sans',sans-serif}
.srch:focus{border-color:rgba(200,169,110,.4)}.srch::placeholder{color:var(--text3)}
.chip{padding:6px 14px;border:1px solid var(--b1);border-radius:16px;background:transparent;color:var(--text3);font-size:12px;transition:all .15s;white-space:nowrap;cursor:pointer}
.chip:hover{color:var(--text);border-color:var(--b2);background:var(--bg3)}.chip.act{border-color:rgba(200,169,110,.4);color:var(--gold);background:rgba(200,169,110,.08)}.chip-fam{padding:5px 12px;border:1px solid var(--b1);border-radius:14px;background:transparent;color:var(--text3);font-size:11px;transition:all .15s;white-space:nowrap;cursor:pointer}.chip-fam:hover{color:var(--text);border-color:var(--b2);background:var(--bg3)}.chip-fam.act{border-color:rgba(66,165,245,.4);color:#7EC8E3;background:rgba(66,165,245,.07)}
.bgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.gc{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden;transition:all .15s;cursor:pointer;position:relative}
.gc:hover{border-color:rgba(200,169,110,.35);transform:translateY(-2px)}
.gc.must{border-color:rgba(200,169,110,.5);box-shadow:0 0 0 1px rgba(200,169,110,.3)}
.pgrid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;width:100%;height:100%;gap:1.5px;background:var(--bg3);align-items:stretch;justify-items:stretch}
.pgrid-cell{overflow:hidden;background:var(--bg3);position:relative;min-height:0;min-width:0}
.pgrid-cell img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .35s;display:block}
.pgrid-cell img.ok{opacity:1}
.pgrid-cell .fb{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.pgrid-cell .fb svg{width:40px;height:40px}
.must-badge{position:absolute;top:6px;left:6px;background:var(--gold);color:#000;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;z-index:2;letter-spacing:.05em}
.nb-note{padding:7px 14px;border:1px solid var(--b2);border-radius:20px;background:transparent;color:var(--text2);font-size:13px;transition:all .15s}
.nb-note:hover{background:var(--bg3);color:var(--text)}.nb-note.act{background:var(--gold);color:#000;border-color:var(--gold);font-weight:500}
.bs-en{display:inline-block;font-size:9px;padding:1px 5px;border-radius:6px;margin:1px 1px 0 0;background:rgba(200,169,110,.12);color:var(--gold);border:0.5px solid rgba(200,169,110,.3)}
.bs-eu{display:inline-block;font-size:9px;padding:1px 5px;border-radius:6px;margin:1px 1px 0 0;background:rgba(66,165,245,.1);color:#7EC8E3;border:0.5px solid rgba(66,165,245,.25)}
.bs-gia{display:inline-block;font-size:9px;padding:1px 5px;border-radius:6px;margin:1px 1px 0 0;background:rgba(76,175,122,.1);color:var(--ok);border:0.5px solid rgba(76,175,122,.25)}
.dis-overlay{position:absolute;top:0;right:0;background:rgba(80,80,80,.75);color:#ccc;font-size:9px;padding:2px 6px;border-bottom-left-radius:6px;letter-spacing:.03em}
.gci{height:190px;display:grid;overflow:hidden}.gcb{padding:10px 13px 12px}
.gen{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:500;line-height:1.2;margin-bottom:2px}
.gzh{font-size:12px;color:var(--text2);margin-bottom:4px}.gph{font-size:11px;color:var(--text3)}
.gsc{float:right;font-size:10px;padding:2px 6px;border-radius:8px;margin-top:1px}
.sok{background:rgba(76,175,122,.15);color:var(--ok)}.ser{background:rgba(224,82,82,.15);color:var(--err)}.sno{background:var(--bg3);color:var(--text3)}

/* ── flashcard ── */
.fcw{display:flex;flex-direction:column;align-items:center;gap:16px;padding:8px 0}
.fc{width:min(390px,100%);perspective:1200px}
.fci{position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.fci.flip{transform:rotateY(180deg)}
.face{background:var(--bg2);border:1px solid var(--b2);border-radius:16px;overflow:hidden;backface-visibility:hidden;-webkit-backface-visibility:hidden}
.face.back{position:absolute;inset:0;transform:rotateY(180deg)}
.fcimg{height:200px;position:relative}.fchint{padding:12px;text-align:center;color:var(--text3);font-size:13px}
/* Back face image is smaller so text content fits in same card height */
.face.back .fcimg{height:130px}
.fcans{padding:10px 18px 16px;text-align:center}
.aen{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:500;margin-bottom:4px}
.azh{font-size:15px;color:var(--text2);margin-bottom:5px}.aph{font-size:13px;color:var(--gold);margin-bottom:4px}.asy{font-size:11px;color:var(--text3)}
.syl-s{color:var(--text);font-weight:500;text-decoration:underline;text-underline-offset:3px}
.tip{margin-top:8px;font-size:11px;color:var(--text3);font-style:italic;line-height:1.5;padding:6px 10px;background:var(--bg3);border-radius:8px;text-align:left}
.fcbs{display:flex;gap:10px;width:min(390px,100%)}
.fcb{flex:1;padding:12px;border:1px solid var(--b2);border-radius:10px;background:transparent;font-size:14px;transition:all .15s}
.fcb.know{border-color:var(--ok);color:var(--ok)}.fcb.know:hover{background:rgba(76,175,122,.1)}
.fcb.nope{border-color:var(--err);color:var(--err)}.fcb.nope:hover{background:rgba(224,82,82,.1)}
.spk{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border:1px solid rgba(200,169,110,.35);border-radius:20px;background:transparent;color:var(--gold);font-size:13px;transition:all .15s;-webkit-tap-highlight-color:rgba(200,169,110,.2)}
.spi{width:100%;padding:14px;background:var(--bg2);border:2px solid var(--b2);border-radius:10px;color:var(--text);font-size:20px;text-align:center;letter-spacing:3px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s}
.spi:focus{border-color:rgba(200,169,110,.5)}
.spi.ok{border-color:var(--ok)}.spi.err{border-color:var(--err)}
.sp-letter{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:500;letter-spacing:3px;word-break:break-all;text-align:center}
.spk:hover{background:rgba(200,169,110,.1)}
.spk:active{background:rgba(200,169,110,.25);transform:scale(0.95)}
.spk.playing{background:rgba(200,169,110,.2);border-color:var(--gold)}

/* ── quiz ── */
.qw{display:flex;flex-direction:column;align-items:center;gap:16px;padding:8px 0}
.qimg{width:min(460px,100%);height:340px;border:1px solid var(--b2);border-radius:16px;overflow:hidden;position:relative}
.qch{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:min(480px,100%)}
.qb{padding:13px 14px;background:var(--bg2);border:1px solid var(--b2);border-radius:10px;color:var(--text);font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:500;text-align:left;transition:all .15s;line-height:1.3}
.qb .sub{display:block;font-size:11px;color:var(--text3);font-family:'DM Sans',sans-serif;font-weight:400;margin-top:2px}
.qb:hover:not(:disabled){border-color:rgba(200,169,110,.4);background:var(--bg3)}
.qb.correct{border-color:var(--ok);background:rgba(76,175,122,.1);color:var(--ok)}
.qb.wrong{border-color:var(--err);background:rgba(224,82,82,.1);color:var(--err)}
.qb:disabled{cursor:default}

/* ── listen ── */
.lw{display:flex;flex-direction:column;align-items:center;gap:18px;padding:8px 0}
.pb{width:74px;height:74px;border-radius:50%;border:2px solid var(--gold);background:rgba(200,169,110,.1);color:var(--gold);display:flex;align-items:center;justify-content:center;transition:all .2s}
.pb:hover{background:rgba(200,169,110,.2);transform:scale(1.06)}
.lch{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:min(620px,100%)}
.lc{display:flex;flex-direction:column;align-items:center;background:var(--bg2);border:1px solid var(--b2);border-radius:12px;overflow:hidden;transition:all .15s}
.lc:hover:not(:disabled){border-color:rgba(200,169,110,.35)}.lc.correct{border-color:var(--ok)}.lc.wrong{border-color:var(--err)}.lc:disabled{cursor:default}
.limg{width:100%;height:180px;position:relative}.lname{padding:9px 8px;font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:500;text-align:center;line-height:1.3}
.lzh{font-size:11px;color:var(--text3);font-family:'DM Sans',sans-serif}

/* ── start / mode bar ── */
.ss{display:flex;flex-direction:column;align-items:center;gap:16px;padding:48px 20px;text-align:center}
.st{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:500}
.ss2{font-size:14px;color:var(--text2);max-width:320px;line-height:1.6}
.bb{padding:13px 40px;background:var(--gold);border:none;border-radius:10px;color:#000;font-size:16px;font-weight:500;transition:opacity .15s}
.bb:hover{opacity:.85}.bbs{padding:10px 30px;font-size:14px;background:var(--gold);border:none;border-radius:10px;color:#000;font-weight:500;transition:opacity .15s}
.bbs:hover{opacity:.85}
.mb{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.ms{font-size:13px;color:var(--text3)}.ex{background:none;border:none;color:var(--text3);font-size:13px;padding:4px 8px}
.ex:hover{color:var(--text)}

/* ── stats ── */
.stc{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.stcd{background:var(--bg2);border:1px solid var(--b1);border-radius:10px;padding:14px;text-align:center}
.stn{font-size:28px;font-weight:500;display:block;margin-bottom:4px}.stl{font-size:12px;color:var(--text3)}
.stg{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:6px}
.str{background:var(--bg2);border:1px solid var(--b1);border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px}
.sdd{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── toast ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(10px);padding:11px 22px;border-radius:10px;font-size:14px;font-weight:500;z-index:100;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.good{background:#1D4D2E;border:1px solid var(--ok);color:var(--ok)}.toast.bad{background:#4D1D1D;border:1px solid var(--err);color:var(--err)}
@media(max-width:440px){.bgrid{grid-template-columns:repeat(2,1fr)};main{padding:14px}}
</style>
</head>
<body>
<nav>
  <span class="logo">💎</span>
  <button class="nb act" id="nav-browse" onclick="go('browse')">📖 瀏覽</button>
  <button class="nb" id="nav-flash"  onclick="go('flash')">🎴 閃卡</button>
  <button class="nb" id="nav-quiz"   onclick="go('quiz')">🎯 認名</button>
  <button class="nb" id="nav-listen" onclick="go('listen')">👂 聽力</button>
  <button class="nb" id="nav-spell"  onclick="go('spell')">✍️ 拼字</button>
  <button class="nb" id="nav-jewel"  onclick="go('jewel')">💍 珠寶類型</button>
  <button class="nb" id="nav-birth"  onclick="go('birth')">🗓️ 誕生石</button>
  <button class="nb" id="nav-classify" onclick="go('classify')">🪨 石頭分類</button>
  <button class="nb" id="nav-cuts"   onclick="go('cuts')">✂️ 切割</button>
  <button class="nb" id="nav-stats"  onclick="go('stats')">📊 進度</button>
</nav>
<div class="pw"><div class="prog" id="prog"></div></div>
<main id="main"></main>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════
//  IMAGE SYSTEM — Stones Jewellery Victoria (Shopify)
//
//  Each gem entry in SHOP_GEMS has:
//    coll — Shopify collection handle (null = SVG fallback)
//    inc  — product title MUST contain one of these (all lowercase)
//    exc  — product title must NOT contain any of these
// ══════════════════════════════════════════════════════

const STORE  = 'https://stonesjewelleryvictoria.com';
const STORE2 = 'https://www.stonesjewellerybanff.com';

// Banff store collection handles (supplements Victoria for missing/poor matches)
const BANFF_GEMS = {
  'Agate':                    {coll:'colored-gemstones', inc:['agate']},
  'Alexandrite':              {coll:'colored-gemstones', inc:['alexandrite']},
  'Ammolite':                 {coll:'colored-gemstones', inc:['ammolite']},
  'Beryl':                    {coll:'colored-gemstones', inc:['beryl']},
  'Black Opal':               {coll:'colored-gemstones', inc:['black opal']},
  'Boulder Opal':             {coll:'colored-gemstones', inc:['boulder opal','boulder']},
  'Carnelian':                {coll:'colored-gemstones', inc:['carnelian']},
  "Chrysoberyl Cat's Eye":    {coll:'colored-gemstones', inc:['chrysoberyl','cat']},
  'Chrysocolla':              {coll:'colored-gemstones', inc:['chrysocolla']},
  'Chrysoprase':              {coll:'colored-gemstones', inc:['chrysoprase']},
  'Fire Opal':                {coll:'colored-gemstones', inc:['fire opal']},
  'Fossilized Opal Clam Shell':{coll:'colored-gemstones', inc:['fossil','clam']},
  'Fossils':                  {coll:'colored-gemstones', inc:['fossil']},
  'Hematite':                 {coll:'colored-gemstones', inc:['hematite']},
  'Hessonite':                {coll:'colored-gemstones', inc:['hessonite']},
  'Imperial Topaz':           {coll:'colored-gemstones', inc:['imperial topaz']},
  'Topaz':                    {coll:'colored-gemstones', inc:['yellow topaz','golden topaz','orange topaz','champagne topaz','precious topaz','honey topaz'], exc:['blue','imperial','london','swiss','sky','mystic']},
  'Ivory':                    {coll:'colored-gemstones', inc:['ivory']},
  'Kunzite':                  {coll:'colored-gemstones', inc:['kunzite']},
  'Mexican Fire Opal':        {coll:'colored-gemstones', inc:['mexican']},
  'Opal':                     {coll:'colored-gemstones', inc:['opal'], exc:['black opal','boulder','fire opal','mexican','fossil']},
  'Red Jasper':               {coll:'colored-gemstones', inc:['jasper']},
  'Crystal':                  {coll:'colored-gemstones', inc:['crystal quartz','clear quartz','quartz crystal']},
  'Rose Quartz':              {coll:'colored-gemstones', inc:['rose quartz']},
  'Rutilated Quartz':         {coll:'colored-gemstones', inc:['rutilated quartz','rutilated','rutile quartz']},
  'Smoky Quartz':             {coll:'colored-gemstones', inc:['smoky quartz','smoky']},
  'Rhodonite':                {coll:'colored-gemstones', inc:['rhodonite']},
  'Spinel':                   {coll:'colored-gemstones', inc:['spinel']},
  "Tiger's Eye":              {coll:'colored-gemstones', inc:["tiger"]},
  'Tsavorite':                {coll:'colored-gemstones', inc:['tsavorite']},
  'Zircon':                   {coll:'colored-gemstones', inc:['zircon']},
};

const SHOP_GEMS = {
  'Agate':                    {coll:null},
  'Alexandrite':              {coll:null},
  'Amber':                    {coll:'amber', inc:[]},
  'Amethyst':                 {coll:'amethyst-ametrine', inc:['amethyst'], exc:['ametrine']},
  'Ammolite':                 {coll:'ammolite', inc:[]},
  'Aquamarine':               {coll:'aquamarine', inc:[]},
  'Aventurine':               {coll:null},
  'B.C. Jade':                {coll:null}, // nephrite carvings visually too similar to Jade jewelry — use SVG
  'Beryl':                    {coll:null},
  'Black Opal':               {coll:'opals', inc:['black opal','black'], exc:['boulder','fire','mexican']},
  'Blue Topaz':               {coll:'topaz', inc:['blue'], exc:['imperial','london','swiss']},
  'Boulder Opal':             {coll:'opals', inc:['boulder']},
  'Cameo':                    {coll:'cameo', inc:[]},
  'Carnelian':                {coll:null},
  "Chrysoberyl Cat's Eye":    {coll:null},
  'Chrysocolla':              {coll:null},
  'Chrysoprase':              {coll:null},
  'Citrine':                  {coll:'citrines', inc:[]},
  'Coral':                    {coll:'coral', inc:[]},
  'Crystal':                  {coll:'quartz', inc:['crystal quartz','clear quartz','rock crystal','quartz crystal'], exc:['rose','smoky','smoke','rutile','rutilated','amethyst','citrine']},
  'Diamond':                  {coll:'diamonds', inc:[]},
  'Emerald':                  {coll:'emerald', inc:[]},
  'Fire Opal':                {coll:'opals', inc:['fire opal'], exc:['black','boulder','mexican']},
  'Fossilized Opal Clam Shell':{coll:null},
  'Fossils':                  {coll:null},
  'Garnet':                   {coll:'garnets', inc:[], exc:['tsavorite','rhodolite','hessonite','demantoid','mali','spessartite','grossular']},
  'Hematite':                 {coll:null},
  'Hessonite':                {coll:'garnets', inc:['hessonite']},
  'Imperial Topaz':           {coll:'topaz', inc:['imperial']},
  'Ivory':                    {coll:null},
  'Jade':                     {coll:'jade', inc:['jade'], exc:["cat's eye",'catseye']},
  "Jade Cat's Eye":           {coll:null}, // cat's eye jade unlikely labeled as such in store — use SVG
  'Kunzite':                  {coll:null},
  'Labradorite':              {coll:'multistone', inc:['labradorite']},
  'Lapis Lazuli':             {coll:'lapis', inc:[]},
  'Malachite':                {coll:'malachite', inc:[]},
  'Mexican Fire Opal':        {coll:'opals', inc:['mexican']},
  'Morganite':               {coll:'multistone', inc:['morganite']},
  'Iolite':                  {coll:'multistone', inc:['iolite']},
  'Moonstone':               {coll:'multistone', inc:['moonstone']},
  'Onyx':                     {coll:'onyx', inc:[]},
  'Opal':                     {coll:'opals', inc:[], exc:['black','boulder','mexican','fire','fossilized','clam']},
  'Mother of Pearl':          {coll:'pearls', inc:['mother of pearl','mother-of-pearl','nacre'], exc:[]},
  'Pearl':                    {coll:'pearls', inc:[], exc:['south sea','tahitian','black','mother']},
  'Peridot':                  {coll:'peridot', inc:[]},
  'Red Jasper':               {coll:null},
  'Rhodochrosite':            {coll:'rhodochrosite', inc:[]},
  'Rhodolite':                {coll:'garnets', inc:['rhodolite']},
  'Rhodonite':                {coll:null},
  'Rose Quartz':              {coll:'quartz', inc:['rose quartz','rose']},
  'Ruby':                     {coll:'rubies', inc:[]},
  'Rutilated Quartz':         {coll:'quartz', inc:['rutilated','rutile']},
  'Sapphire':                 {coll:'sapphires', inc:[]},
  'Smoky Quartz':             {coll:'quartz', inc:['smoky','smoke']},
  'South Sea Pearl':          {coll:'pearls', inc:['south sea']},
  'Spinel':                   {coll:null},
  "Tiger's Eye":              {coll:null},
  'Tahitian Black Pearl':     {coll:'pearls', inc:['tahitian','black']},
  'Tanzanite':                {coll:'tanzanite', inc:[]},
  'Topaz':                    {coll:'topaz', inc:['yellow topaz','golden topaz','orange topaz','champagne topaz','precious topaz','honey topaz'], exc:['blue','imperial','london','swiss','mystic','sky']},
  'Tourmaline':               {coll:'tourmaline', inc:[], exc:["cat's eye",'catseye']},
  "Tourmaline Cat's Eye":     {coll:'tourmaline', inc:["cat's eye",'catseye','cat eye']},
  'Tsavorite':                {coll:'garnets', inc:['tsavorite']},
  'Turquoise':                {coll:'turquoise', inc:[]},
  'Zircon':                   {coll:null},
};

// Shopify CDN image resize: append _600x before extension
// Shopify image resize — strip existing size modifier + query string, then add _600x
// e.g. product_grande.jpg?v=123 → product_600x.jpg
function shopifyResize(src) {
  return src
    .replace(/\?.*$/, '')                          // strip query string
    .replace(/_(?:pico|icon|thumb|small|compact|medium|large|grande|original|\d+x\d*|x\d+)(\.[^.]+)$/i, '$1') // strip existing size modifier
    .replace(/\.(jpe?g|png|webp|gif)$/i, '_600x.$1'); // add 600x
}

// Filter products by inc/exc keyword rules
function filterProducts(products, cfg) {
  return products.filter(p => {
    const t = p.title.toLowerCase();
    if (cfg.exc && cfg.exc.some(x => t.includes(x))) return false;
    if (!cfg.inc || cfg.inc.length === 0) return true;
    return cfg.inc.some(kw => t.includes(kw));
  });
}

// IMG[gem] = array of 4 product image URLs (padded by cycling)
const IMG = {};
const _collCache = {};
let _imgLoaded = false;

// Possible Banff collection handles to probe (tried in order until one returns products)
const BANFF2_HANDLES = [
  'colored-gemstones',
  'colour-gemstones',
  'gemstones',
  'gems',
  'all',
];
let _banffHandle = null; // will be set to whichever handle works

async function fetchCollection(store, coll) {
  const key = store + '|' + coll;
  if (_collCache[key] !== undefined) return _collCache[key];
  _collCache[key] = [];
  try {
    const url = `${store}/collections/${coll}/products.json?limit=250`;
    const r = await fetch(url, {signal: AbortSignal.timeout(15000)});
    if (!r.ok) return [];
    const d = await r.json();
    _collCache[key] = d.products || [];
    return _collCache[key];
  } catch(e) { return []; }
}

// Try every known Banff handle, pick the first one that returns products
async function probeBanff() {
  for (const handle of BANFF2_HANDLES) {
    const prods = await fetchCollection(STORE2, handle);
    if (prods.length > 0) {
      _banffHandle = handle;
      console.log('[Banff] Found collection:', handle, '—', prods.length, 'products');
      // Mirror all fetched pages into every BANFF_GEMS entry
      const key = STORE2 + '|' + handle;
      for (const [gem, cfg] of Object.entries(BANFF_GEMS)) {
        _collCache[STORE2 + '|' + cfg.coll] = _collCache[key];
      }
      return prods;
    }
  }
  console.warn('[Banff] No collection found. Tried:', BANFF2_HANDLES);
  return [];
}

function pickImgs(products, cfg, count=4) {
  // STRICT: only use inc-matched products. Never fall back to full collection.
  let matched = filterProducts(products, cfg);
  // De-duplicate by image URL (not just title)
  const seen = new Set();
  const imgs = [];
  for (const p of matched) {
    // Try up to 2 images per product for better variety
    const srcs = (p.images || []).slice(0,2).map(img => shopifyResize(img.src)).filter(Boolean);
    for (const src of srcs) {
      if (!seen.has(src)) {
        seen.add(src);
        imgs.push(src);
      }
      if (imgs.length >= count) break;
    }
    if (imgs.length >= count) break;
  }
  return imgs;
}

async function loadImages() {
  setStatus('🔍 載入店鋪圖片中...', true);

  // Phase 1: fetch all Victoria collections
  const vColls = [...new Set(Object.values(SHOP_GEMS).map(c=>c.coll).filter(Boolean))];
  await Promise.all(vColls.map(coll => fetchCollection(STORE, coll)));

  // Phase 2: probe Banff — auto-detects correct collection handle
  const banffProds = await probeBanff();
  setStatus(`🔍 Victoria ✓ · Banff ${banffProds.length ? `✓ (${_banffHandle}, ${banffProds.length}件)` : '❌ 未找到'} · 比對中...`, true);

  // Build a deduplicated list of gems to process
  const allGems = [...new Set([...Object.keys(SHOP_GEMS), ...Object.keys(BANFF_GEMS)])];

  for (const gem of allGems) {
    if (IMG[gem]) continue;

    // Try Victoria (strict inc/exc match only)
    const vcfg = SHOP_GEMS[gem];
    if (vcfg && vcfg.coll) {
      const vprods = _collCache[STORE + '|' + vcfg.coll] || [];
      const imgs = pickImgs(vprods, vcfg);
      if (imgs.length >= 1) {
        IMG[gem] = [0,1,2,3].map(i => imgs[i % imgs.length]);
        patchDOM(gem);
        continue;
      }
    }

    // Try Banff (strict inc match only)
    const bcfg = BANFF_GEMS[gem];
    if (bcfg && bcfg.coll) {
      const bprods = _collCache[STORE2 + '|' + bcfg.coll] || [];
      const imgs = pickImgs(bprods, bcfg);
      if (imgs.length >= 1) {
        IMG[gem] = [0,1,2,3].map(i => imgs[i % imgs.length]);
        patchDOM(gem);
        continue;
      }
    }
    // No match → stays as SVG illustration (no IMG[gem] set = SVG shows)
  }

  _imgLoaded = true;
  const n = Object.keys(IMG).length;
  setStatus(`✓ 已載入 ${n} 種寶石照片${_banffHandle ? ' · Banff:' + _banffHandle : ''}`, false);
}

function patchDOM(gem) {
  const urls = IMG[gem];
  if (!urls || !urls.length) return;
  document.querySelectorAll(`.ps[data-gem="${CSS.escape(gem)}"] .pgrid-cell`).forEach((cell, i) => {
    const url = urls[i % urls.length];
    let img = cell.querySelector('img');
    if (!img) {
      img = document.createElement('img');
      img.alt = gem; img.loading = 'lazy';
      img.onload = () => img.classList.add('ok');
      img.onerror = () => img.remove();
      cell.appendChild(img);
    }
    if (img.src !== url) img.src = url;
  });
}

function setStatus(msg, loading) {
  const el = document.getElementById('img-status');
  if (!el) return;
  el.innerHTML = (loading ? '<div class="spin"></div>' : '') + `<span>${msg}</span>`;
}

function ca(h, a) {
  const r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16);
  return `rgb(${Math.min(255,Math.max(0,r+a))},${Math.min(255,Math.max(0,g+a))},${Math.min(255,Math.max(0,b+a))})`;
}

  return`<svg viewBox="0 0 100 100" ${S} xmlns="http://www.w3.org/2000/svg"><polygon points="50,14 78,30 78,70 50,86 22,70 22,30" fill="${m}" ${n}/><polygon points="50,14 78,30 64,35 36,35 22,30" fill="${L}" ${n}/><polygon points="22,30 36,35 36,72 22,70" fill="${D}" ${n}/></svg>`;
}

function picSlot(en, sh, hx, svgsz) {
  const urls = IMG[en] || [];
  const fb = `<div class="fb">${svgFb(sh, hx, svgsz||80)}</div>`;
  // Always render as 2×2 grid (4 cells). If no images yet, each cell shows SVG.
  const cells = [0,1,2,3].map(i => {
    const url = urls[i % urls.length];
    const img = url ? `<img src="${url}" alt="${en}" loading="lazy" onload="this.classList.add('ok')" onerror="this.remove()">` : '';
    return `<div class="pgrid-cell">${fb}${img}</div>`;
  }).join('');
  return `<div class="ps pgrid" data-gem="${en}">${cells}</div>`;
}

const LS_KEY = 'gem-learner-scores-v1'; // localStorage key, shared across all versions of this file
function loadScores() { try { return JSON.parse(localStorage.getItem(LS_KEY) || '{}'); } catch(e) { return {}; } }
function saveScores() { try { localStorage.setItem(LS_KEY, JSON.stringify(ST.scores)); } catch(e) {} }

const ST={mode:'browse',bF:'all',bFam:null,bQ:'',fcQ:[],fcI:0,fcFlip:false,fcSes:{c:0,t:0},qQ:[],qI:0,qCh:[],qAns:false,qSel:null,qSes:{c:0,t:0},lQ:[],lI:0,lCh:[],lAns:false,lSel:null,lSes:{c:0,t:0},lAuto:false,spQ:[],spI:0,spAns:false,spTyped:'',spSes:{c:0,t:0},scores:loadScores()};
function gsc(en){return ST.scores[en]||{c:0,t:0};}
function rec(en,ok){const s=gsc(en);s.t++;if(ok)s.c++;ST.scores[en]=s;saveScores();upProg();}
function upProg(){const active=G.filter(g=>!g.dis);const n=active.filter(g=>{const s=gsc(g.en);return s.t>=2&&s.c/s.t>=0.7;}).length;const el=document.getElementById('prog');if(el)el.style.width=(n/active.length*100)+'%';}
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
// Discontinued gems are excluded from practice queues (quiz/flashcard/listen)
function weighted(){const active=G.filter(g=>!g.dis);const out=[];active.forEach(g=>{const s=gsc(g.en);let w=3;if(s.t>0){const r=s.c/s.t;w=r>=0.8?1:r>=0.5?2:4;}for(let i=0;i<w;i++)out.push(g);});return shuf(out).slice(0,active.length*2);}
function imgKey(gem) {
  // Returns a string key representing the visual "group" of a gem's images.
  // Gems with identical keys look the same and shouldn't appear together as choices.
  const urls = IMG[gem] || [];
  if (!urls.length) return 'svg:' + gem; // SVG fallback — each gem has unique SVG color
  // Use first image URL as key (same product = same key)
  return urls[0];
}

function ch4(g) {
  // Build a pool excluding: the target gem, discontinued gems
  const pool = shuf(G.filter(x => x.en !== g.en && !x.dis));
  const targetKey = imgKey(g.en);
  const chosen = [];
  const usedKeys = new Set([targetKey]);

  // First pass: prefer gems that are visually distinct (different imgKey)
  for (const x of pool) {
    if (chosen.length >= 3) break;
    const k = imgKey(x.en);
    if (!usedKeys.has(k)) {
      usedKeys.add(k);
      chosen.push(x);
    }
  }

  // Second pass: if we still need more (rare edge case), allow repeating image keys
  for (const x of pool) {
    if (chosen.length >= 3) break;
    if (!chosen.includes(x)) chosen.push(x);
  }

  return shuf([g, ...chosen]);
}
function phonEl(g){return g.sy.map(s=>`<span class="${s.s?'syl-s':''}">${s.t}</span>`).join('<span style="color:#3A3A50;margin:0 2px">·</span>');}
function spk(t, r=0.85, btnEl) {
  // Visual feedback on the button
  if (btnEl) {
    btnEl.classList.add('playing');
    setTimeout(() => btnEl.classList.remove('playing'), 1200);
  }
  // On iOS, speechSynthesis sometimes needs a small delay after cancel
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(t);
    u.lang = 'en-US'; u.rate = r;
    // iOS requires speak() in the same call stack as user gesture, use tiny timeout as fallback
    setTimeout(() => {
      try { window.speechSynthesis.speak(u); } catch(e) {}
    }, 50);
  } catch(e) {}
}

// ── STATS ──
function rStats(m){
  const active=G.filter(g=>!g.dis);
  const learned=active.filter(g=>{const s=gsc(g.en);return s.t>=2&&s.c/s.t>=0.7;}).length;
  const att=active.filter(g=>gsc(g.en).t>0).length;
  const tc=Object.values(ST.scores).reduce((a,b)=>a+b.c,0);
  const tt=Object.values(ST.scores).reduce((a,b)=>a+b.t,0);
  const sorted=[...active].sort((a,b)=>{const sa=gsc(a.en),sb=gsc(b.en);return(sa.t>0?sa.c/sa.t:.5)-(sb.t>0?sb.c/sb.t:.5)});
  m.innerHTML=`
    <div style="font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;margin-bottom:18px">學習進度</div>

// ── SPELL ──
function spellFeedback(typed, correct) {
  if (!typed) return `<span style="color:var(--text3)">（未輸入）</span>`;
  // LCS-based diff for clear error highlighting
  const a = typed, b = correct;
  const n = a.length, m = b.length;
  // Build LCS table (case-insensitive)
  const dp = Array.from({length:n+1}, ()=>new Uint16Array(m+1));
  for (let i=1;i<=n;i++) for (let j=1;j<=m;j++) {
    dp[i][j] = a[i-1].toLowerCase()===b[j-1].toLowerCase() ? dp[i-1][j-1]+1 : Math.max(dp[i-1][j],dp[i][j-1]);
  }
  // Backtrack to get diff ops
  const ops = []; // {type:'ok'|'extra'|'miss', ch}
  let i=n, j=m;
  while (i>0 || j>0) {
    if (i>0 && j>0 && a[i-1].toLowerCase()===b[j-1].toLowerCase()) {
      ops.push({type:'ok', ch:a[i-1], correct:b[j-1]}); i--; j--;
    } else if (i>0 && (j===0 || dp[i-1][j]>=dp[i][j-1])) {
      ops.push({type:'extra', ch:a[i-1]}); i--;
    } else {
      ops.push({type:'miss', ch:b[j-1]}); j--;
    }
  }
  ops.reverse();
  // Render: green=correct, red strikethrough=extra typed, red underline=missing
  let html = '';
  for (const op of ops) {
    if (op.type==='ok') {
      // Case mismatch: show in yellow with tooltip
      if (op.ch !== op.correct) html += `<span style="color:#F59E0B" title="大小寫：${op.correct}">${op.ch}</span>`;
      else html += `<span style="color:var(--ok)">${op.ch}</span>`;
    } else if (op.type==='extra') {
      html += `<span style="color:var(--err);text-decoration:line-through;opacity:.7" title="多餘">${op.ch}</span>`;
    } else {
      html += `<span style="color:var(--err);border-bottom:2px solid var(--err);font-weight:600" title="漏掉">${op.ch}</span>`;
    }
  }
  return html;
}

function checkSpell(){

            ['目的 Purpose','呈現顏色、紋理、自然美<br><span style="color:var(--text3);font-size:10px">Show color, patterns, natural beauty</span>','提升亮度與火光<br><span style="color:var(--text3);font-size:10px">Enhance brilliance and fire</span>'],
          ].map(r=>`<tr style="border-bottom:0.5px solid var(--b1)">
            <td style="padding:8px 10px;font-size:12px;color:var(--text3)">${r[0]}</td>
            <td style="padding:8px 10px;font-size:12px">${r[1]}</td>
            <td style="padding:8px 10px;font-size:12px">${r[2]}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>

    <div style="background:rgba(200,169,110,.08);border:1px solid rgba(200,169,110,.25);border-radius:var(--r);padding:14px;margin-bottom:24px">
      <div style="font-size:13px;font-weight:500;color:var(--gold);margin-bottom:8px">💡 重要重點 Key Points</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.9">
        1. 不透明（<span onclick="spk('Opaque')" style="color:var(--gold);cursor:pointer">Opaque 🔊</span>）→ 光線無法穿透 → 只拋光（無刻面）<br>
        2. 半透明（<span onclick="spk('Translucent')" style="color:var(--ok);cursor:pointer">Translucent 🔊</span>）→ 光線可部分穿透 → 刻面切割<br>
        3. 不透明寶石做成凸圓形（<span onclick="spk('Cabochon')" style="color:var(--gold);cursor:pointer">Cabochon 🔊</span>），可保留顏色與紋理的自然美。<br>
        4. 刻面切割透過特殊角度讓光線反射，產生閃耀與火光（<span onclick="spk('Brilliance and Fire')" style="color:var(--gold);cursor:pointer">Brilliance &amp; Fire 🔊</span>）。
      </div>
    </div>

    <div style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;margin-bottom:12px">基本切割類型 Basic Cut Types</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:24px">
      ${basicCuts.map(c=>`<div style="background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:12px 14px;transition:border-color .15s" onmouseover="this.style.borderColor='rgba(200,169,110,.35)'" onmouseout="this.style.borderColor=''">
        <div onclick="spk('${c.en.replace(/'/g,"\\'")}')"
          style="font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:500;margin-bottom:2px;cursor:pointer">${c.en} 🔊</div>
        <div style="font-size:12px;color:var(--gold);margin-bottom:4px">${c.zh}</div>
        <div style="font-size:11px;color:var(--text3);line-height:1.5">${c.desc}</div>
      </div>`).join('')}
    </div>

    <div style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;margin-bottom:12px">花式切割形狀 Fancy Shapes</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px">${fancyShapes.map(shapeBtn).join('')}</div>

    <div style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;margin-bottom:12px">其他特殊外形 Other Special Shapes</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px">${specialShapes.map(shapeBtn).join('')}</div>

    <div style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;margin-bottom:10px">📚 切割形狀對照圖</div>
    <div style="border-radius:var(--r);overflow:hidden;border:1px solid var(--b1)">
      <img src="assets/cuts-guide.png" alt="Gemstone Cuts Guide" style="width:100%;display:block">
    </div>

    <div style="background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:14px">
      <div style="font-size:13px;font-weight:500;margin-bottom:10px">📖 名詞小百科 Terminology</div>
      <div style="font-size:12px;color:var(--text2);line-height:2">
        • <span onclick="spk('Cabochon')" style="cursor:pointer;color:var(--gold)">Cabochon 🔊</span>：表面光滑的圓弧形切割，無刻面。A smooth, rounded cut without facets.<br>
        • <span onclick="spk('Faceted Cut')" style="cursor:pointer;color:var(--gold)">Faceted Cut 🔊</span>：具有多個切面，透過角度反射光線。A cut with many facets that reflect light.<br>
        • <span onclick="spk('Angles')" style="cursor:pointer;color:var(--gold)">Angles 🔊</span>：決定光線如何進入、反射與逸出。Determine how light enters, reflects and exits the stone.
      </div>
    </div>
  `;
}

// ── INIT ──
let _loadStarted = false;
function triggerLoad() {
  if (_loadStarted) return;
  _loadStarted = true;
  loadImages();
}

render();
upProg();
setTimeout(triggerLoad, 300);

function bSearch(val, sel) {
  ST.bQ = val;
  render();
  const el = document.getElementById('browse-srch');
  if (el) { el.focus(); el.setSelectionRange(sel, sel); }
}
document.addEventListener('keydown', e => {
  if (e.code !== 'Space') return;
  const tag = document.activeElement && document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  e.preventDefault();
  if (ST.mode === 'flash' && ST.fcQ.length) { ST.fcFlip ? fcAns(true) : flipCard(); }
  else if (ST.mode === 'quiz'   && ST.qAns)               qNext();
  else if (ST.mode === 'listen' && ST.lAns)               lNext();
  else if (ST.mode === 'spell'  && ST.spAns)              spellNext();
});

// Pre-seed progress from previous session (imported by user)
(function(){
  try {
    const existing = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
    const seed = {"Garnet":{"c":1,"t":1},"Rutilated Quartz":{"c":1,"t":1}};
    let changed = false;
    for (const [k, v] of Object.entries(seed)) {
      if (!existing[k]) { existing[k] = v; changed = true; }
    }
    if (changed) { localStorage.setItem(LS_KEY, JSON.stringify(existing)); ST.scores = existing; upProg(); }
  } catch(e) {}
})();
</script>
